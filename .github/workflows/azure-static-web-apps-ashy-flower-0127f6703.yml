name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Get Deployment Token
        id: gettoken
        run: |
          DEPLOYMENT_TOKEN=$(az staticwebapp secrets list --name ${{ vars.AZURE_SWA_NAME }} --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --query "properties.apiKey" -o tsv)
          echo "deployment_token=$DEPLOYMENT_TOKEN" >> $GITHUB_OUTPUT
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.gettoken.outputs.deployment_token }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Get Deployment Token
        id: gettoken
        run: |
          DEPLOYMENT_TOKEN=$(az staticwebapp secrets list --name ${{ vars.AZURE_SWA_NAME }} --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --query "properties.apiKey" -o tsv)
          echo "deployment_token=$DEPLOYMENT_TOKEN" >> $GITHUB_OUTPUT
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.gettoken.outputs.deployment_token }}
          action: "close"
