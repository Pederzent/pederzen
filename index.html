<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Personal Website</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

/* TOP BANNER */
.banner{
    display:flex;
    align-items:center;
    gap:10px;
    background:#333;
    color:white;
    padding:10px 15px;
}
.banner img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:50%;
}
.banner h1{
    margin:0;
}

/* HEADER */
.header{
    position:relative;
    height:250px;
}
.header img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.hero-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    text-shadow:2px 2px 4px rgba(0,0,0,0.6);
}

/* CONTENT */
.content{
    text-align:center;
    padding:40px;
    font-size:18px;
}
a{
    color:#0066cc;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
    <img src="avatar.png">
    <h1>Welcome</h1>
</div>

<!-- HEADER -->
<div class="header">
    <img src="avatar.png">
    <div class="hero-text">
        <h1>THP</h1>
        <p>Welcome to pederzen.no</p>
    </div>
</div>

<!-- CONTENT -->
<div class="content">
    <p>I have my own domain now, so welcome to my site:</p>
    <p>
        <a href="https://www.pederzen.no">Pederzen.no</a>
    </p>
</div>

</body>
</html>
